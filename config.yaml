# GEDOS — User-facing configuration
# Secrets (e.g. TELEGRAM_BOT_TOKEN) come from .env
# Version: Semver x.y.z (major.minor.patch)

version: 0.9.12

telegram:
  bot_token: ""  # Loaded from env TELEGRAM_BOT_TOKEN

llm:
  provider: "ollama"
  model: "llama3.2"
  base_url: "http://localhost:11434"

memory:
  database_path: "gedos.db"
  retention_days: 30

modes:
  pilot: true
  copilot: false

copilot:
  check_interval: 10
  suggestions: true
  warnings: true
  sensitivity:
    high: 10
    medium: 30
    low: 120

web:
  browser: "chromium"
  headless: true
  timeout: 30000

voice:
  output_enabled: false
  max_text_length: 500
  provider: "gtts"

github:
  webhook_port: 9876
  auto_fix: true
  auto_pr: true
  auto_merge: false
  notify_on_failure: true
  pr_label: "gedos-bot"

security:
  strict_shell: true
  confirm_destructive: true
  allowed_executables: []

agents:
  max_retries: 3
  terminal:
    timeout: 30
  gui:
    timeout: 10
  web:
    timeout: 30000

logging:
  level: "INFO"
